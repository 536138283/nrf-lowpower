# Bluetooth peripheral/controller: non-connectable legacy advertising only.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF52-LP-ADV"
CONFIG_BT_MAX_CONN=0
CONFIG_BT_EXT_ADV=n
CONFIG_BT_OBSERVER=n
CONFIG_BT_SCAN=n
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_SETTINGS=n
CONFIG_BT_PRIVACY=n

# Low-power defaults for nRF52832. RTT/serial/logging are disabled so the CPU can idle.
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_LOG=n
CONFIG_ASSERT=n
CONFIG_BOOT_BANNER=n
CONFIG_MAIN_STACK_SIZE=1024
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

# nRF52 power/clock choices. RC LFCLK avoids a 32 kHz crystal BOM item; use XTAL if fitted.
CONFIG_CLOCK_CONTROL_NRF=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y
CONFIG_CLOCK_CONTROL_NRF_CALIBRATION=y
CONFIG_SOC_DCDC_NRF52X=y

# Application defaults: one second of advertising every minute.
CONFIG_APP_ADV_PERIOD_MS=60000
CONFIG_APP_ADV_ON_TIME_MS=1000
CONFIG_APP_ADV_INTERVAL_MS=100
CONFIG_APP_COMPANY_ID=0xFFFF
CONFIG_APP_PAYLOAD_MAGIC=0x4C50
